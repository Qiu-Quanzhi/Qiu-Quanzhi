<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="keywords" content="旅禾小栈,古国简展,旅禾,旅禾Ryoine,邱泉智">
    <meta name="description" content="『古国简展』是一个开放历史类数据项目，采用地图为主体框架，便于浏览各个地理时空的人物事件。">
    <meta name="robots" content="index,follow">
    <title>古国简展 | 旅禾Ryoine - 邱泉智 · 旅禾小站</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="canonical" href="https://www.qqzhi.cc/works/HistoryMap/">
    <style>
        /* ==========================================
           CSS Custom Properties
           ========================================== */
        :root {
            --theme-color: #6cf;
            --theme-color-active: #66ccffde;
            --w-alpha-5: rgba(255, 255, 255, .05);
            --w-alpha-10: rgba(255, 255, 255, .1);
            --w-alpha-15: rgba(255, 255, 255, .15);
            --w-alpha-20: rgba(255, 255, 255, .2);
            --w-alpha-30: rgba(255, 255, 255, .3);
            --w-alpha-50: rgba(255, 255, 255, .5);
            --w-alpha-60: rgba(255, 255, 255, .6);
            --w-alpha-70: rgba(255, 255, 255, .7);
            --w-alpha-80: rgba(255, 255, 255, .8);
            --w-alpha-90: rgba(255, 255, 255, .9);
            --bg-w-p: white;
            --bg-w-s: rgb(245, 245, 245);
            --bg-w-pure: white;
            --bg-w-245: rgb(245, 245, 245);
            --txt-w-pure: white;
            --txt-b-pure: black;
            --txt-b-tip: rgba(0, 0, 0, .8);
            --b-alpha-5: rgba(0, 0, 0, .05);
            --b-alpha-10: rgba(0, 0, 0, .1);
            --b-alpha-15: rgba(0, 0, 0, .15);
            --b-alpha-20: rgba(0, 0, 0, .2);
            --b-alpha-30: rgba(0, 0, 0, .3);
            --b-alpha-35: rgba(0, 0, 0, .35);
            --b-alpha-40: rgba(0, 0, 0, .4);
            --b-alpha-50: rgba(0, 0, 0, .5);
            --b-alpha-60: rgba(0, 0, 0, .6);
            --b-alpha-70: rgba(0, 0, 0, .7);
            --b-alpha-80: rgba(0, 0, 0, .8);
            --b-alpha-90: rgba(0, 0, 0, .9);
            --filter-glass-1: blur(20px) saturate(180%);
        }

        /* ==========================================
           Reset & Base
           ========================================== */
        * {
            color: #484848;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, segoe ui, Roboto, Helvetica, Arial, sans-serif;
            font-weight: 800;
			transition: .25s;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            width: 100%;
        }

        a {
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 10px;
        }

        /* ==========================================
           Layout Utilities
           ========================================== */
        .flex-cl {
            display: flex;
            flex-direction: column;
        }

        .flex-ct {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        /* ==========================================
           App Shell
           ========================================== */
        .app {
            height: 100vh;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* ==========================================
           Cover (background image)
           ========================================== */
        .cover {
            z-index: -100;
            position: fixed;
            width: 100%;
            height: 100vh;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            filter: brightness(0.9);
            background-image: url(./cover.avif);
            transition: transform 1.5s, opacity 1s;
            transform: scale(1.05);
            opacity: 0;
        }

        .cover.loaded {
            transform: scale(1);
            opacity: 1;
        }

        .cover.entered {
            opacity: 0;
            transform: scale(1.25);
        }

        /* ==========================================
           Sidebar (right-side overlay panel)
           ========================================== */
        .sidebar {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
            width: 400px;
            right: 0;
            transition: opacity 0.5s, 0.25s;
            opacity: 0;
        }

        .sidebar.loaded {
            opacity: 1;
        }

        /* Sidebar mask — translucent white overlay behind sidebar text */
        .sidebar.mask {
            justify-content: flex-start;
            background-size: 150% 150%;
            background-color: var(--w-alpha-80);
        }

        .sidebar.mask.loaded {
            opacity: 0.6;
        }

        /* ---- Sidebar content ---- */
        .sidebar-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sidebar-title {
            font-size: 40px;
            display: block;
            opacity: 0.85;
        }

        .enter {
            margin: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: var(--theme-color);
            color: var(--txt-w-pure);
            transition: .25s;
            font-size: larger;
            cursor: pointer;
        }

        .enter:hover {
            background-color: var(--theme-color-active);
            color: var(--w-alpha-60);
            box-shadow: rgba(0, 0, 0, .1) 0 5px 10px;
        }

        .copyright {
            bottom: 30px;
            z-index: 100;
            display: inline-block;
            font-size: 15px;
            position: absolute;
            cursor: pointer;
            transition: .25s;
        }

        .author-link {
            margin-left: 5px;
            transition: .25s;
        }

        .author-link:hover {
            color: var(--theme-color);
        }

        /* ==========================================
           About Section
           ========================================== */
        #about {
            position: absolute;
            top: 100%;
            justify-content: flex-start;
            width: 100%;
            background-color: var(--w-alpha-80);
            backdrop-filter: var(--filter-glass-1);
            transition: 0.5s;
        }

        .about-title {
            margin: 70px;
            font-size: 25px;
        }

        .about-underline {
            left: calc(50% - 25px);
            margin-top: -50px;
            width: 50px;
            height: 3px;
            background-color: var(--theme-color);
        }

        .about-content {
            justify-content: flex-start;
            margin: 30px;
        }

        .link-row {
			opacity: 0.8;
            margin-bottom: 10px;
        }

		.link-row:hover {
			opacity: 1;
		}

        .inline-link {
            border-width: 0 0 2px 0;
            border-style: solid;
            border-color: var(--theme-color);
            transition: 0.25s;
        }

        .inline-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="app">
        <div id="cover" class="cover"></div>
        <div id="sidebar-mask" class="sidebar mask"></div>
        <div id="sidebar" class="sidebar">
            <div class="sidebar-group">
                <h1 class="sidebar-title">古国简展</h1>
                <span class="enter" id="enter-btn">点击进入</span>
            </div>
            <span class="copyright">© 2022&nbsp;<a href="/" target="_blank" class="author-link">邱泉智</a></span>
        </div>
    </div>
    <div id="about" class="flex-ct flex-cl">
        <span class="about-title">关于『古国简展』</span>
        <span class="about-underline"></span>
        <div class="about-content flex-ct flex-cl">
            <p>『古国简展』是一个开放历史类数据项目。</p>
            <p>在这里，我们收录各个古代国家的时空事件、地理信息，</p>
            <p>并在地图图像上将其展现出来。</p>
            <p>本项目为早期作品，现已停止维护。</p>
            <div class="link-row">
                <span>&#62;</span>
                <a target="_blank" href="https://Qiu-Quanzhi.github.io/HistoryMap/" class="inline-link">网页应用入口</a>
                <span>&#60;</span>
            </div>
            <div class="link-row">
                <span>&#62;</span>
                <a target="_blank" href="https://github.com/Qiu-Quanzhi/HistoryMap" class="inline-link">项目地址</a>
                <span>&#60;</span>
            </div>
        </div>
    </div>
    <script>
        function show() {
            setTimeout(function() {
                document.getElementById("cover").setAttribute("class", "cover loaded")
            }, 100)
            setTimeout(function() {
                document.getElementById("sidebar-mask").setAttribute("class", "sidebar mask loaded")
            }, 500)
            setTimeout(function() {
                document.getElementById("sidebar").setAttribute("class", "sidebar loaded")
            }, 1000)
        }

        function enter(e) {
            e.stopPropagation();
            document.getElementById("cover").setAttribute("class", "cover entered")
            document.getElementById("sidebar-mask").setAttribute("class", "sidebar mask")
            document.getElementById("sidebar").setAttribute("class", "sidebar")
            setTimeout(function() {
                window.location.href = "https://Qiu-Quanzhi.github.io/HistoryMap/"
            }, 400)
        }

        window.addEventListener('pageshow', show);
        document.getElementById('enter-btn').addEventListener('click', enter);
    </script>
</body>
</html>
