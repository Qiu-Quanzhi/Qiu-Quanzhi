<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>404 | 旅禾Ryoine - 邱泉智QIU Quanzhi · 旅禾小站</title>
  <link rel="icon" href="https://www.qqzhi.cc/favicon.ico">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --c-primary: #66ccff;
      --c-primary-active: #4db8e6;
      --c-text: rgba(0, 0, 0, 0.85);
      --c-text-secondary: rgba(0, 0, 0, 0.55);
      --c-bg: #f0f4f8;
      --c-card-bg: rgba(255, 255, 255, 0.75);
      --c-card-border: rgba(255, 255, 255, 0.5);
      --c-shadow: rgba(0, 0, 0, 0.08);
      --backdrop: blur(16px) saturate(140%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --c-text: rgba(255, 255, 255, 0.9);
        --c-text-secondary: rgba(255, 255, 255, 0.5);
        --c-bg: #1a1d22;
        --c-card-bg: rgba(255, 255, 255, 0.06);
        --c-card-border: rgba(255, 255, 255, 0.08);
        --c-shadow: rgba(0, 0, 0, 0.3);
      }
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      padding: 24px;
    }

    /* ── 装饰性背景圆 ── */
    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--c-primary), transparent 70%);
      top: -200px;
      left: -150px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--c-primary), transparent 70%);
      bottom: -150px;
      right: -100px;
    }

    /* ── 卡片容器 ── */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 40px;
      background: var(--c-card-bg);
      border: 1px solid var(--c-card-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px var(--c-shadow);
      backdrop-filter: var(--backdrop);
      -webkit-backdrop-filter: var(--backdrop);
    }

    /* ── 状态码 ── */
    .code {
      font-size: clamp(80px, 18vw, 135px);
      font-weight: 700;
      line-height: 1;
      color: var(--c-primary);
      letter-spacing: -0.02em;
    }

    /* ── 标题 ── */
    .title {
      margin-top: 8px;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 500;
      color: var(--c-text);
    }

    /* ── 描述 ── */
    .desc {
      margin-top: 12px;
      font-size: 14px;
      color: var(--c-text-secondary);
    }

    .desc a {
      color: var(--c-primary);
      text-decoration: none;
    }

    .desc a:hover {
      text-decoration: underline;
    }

    /* ── 按钮 ── */
    .btn-home {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 32px;
      background: var(--c-primary);
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-home:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-home:active {
      opacity: 0.65;
      transform: translateY(0);
    }

    /* ── 页脚 ── */
    .footer {
      position: fixed;
      bottom: 40px;
      font-size: 13px;
      color: var(--c-text-secondary);
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="code">404</div>
    <div class="title">页面好像走丢了……</div>
    <p class="desc">
      如有疑问请联系
      <a href="mailto:i@qqzhi.cc" target="_blank" rel="noopener">i@qqzhi.cc</a>
    </p>
    <a href="https://www.qqzhi.cc/" class="btn-home" rel="noreferrer">返回主站首页</a>
  </div>

  <footer class="footer">© 旅禾Ryoine</footer>

  <script>
    (function () {
      var y = new Date().toLocaleString([], { timeZone: "Asia/Shanghai" });
      document.querySelector(".footer").textContent =
        "© " + new Date(y).getFullYear() + " 旅禾Ryoine";
    })();
  </script>
</body>
</html>
